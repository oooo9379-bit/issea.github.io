<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        body {
            text-align: center;
            padding: 60px 20px;
            font-family: Arial, sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #000;
            background: #fff;
        }
    </style>
</head>
<body>
    <div>Opening Telegram, please wait...</div>
    <script>
        const TG_USERNAME = "tina159638";
        const appUrl  = "tg://resolve?domain=" + TG_USERNAME;
        const webUrl  = "https://t.me/" + TG_USERNAME;

        let triggered = false;
        location.href = appUrl;

        document.addEventListener("visibilitychange", function(){
            if(document.hidden) triggered = true;
        });

        setTimeout(function(){
            if(!triggered) location.href = webUrl;
        }, 200);
    </script>
</body>
</html>
