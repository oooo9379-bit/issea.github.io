<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Chat with Tina on Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 26px;
            font-weight: 900;
            color: #000;
            background: #fff;
            -webkit-font-smoothing: antialiased;
            text-align: center;
            padding: 0 20px;
        }
        #clickArea {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            cursor: pointer;
        }
        .content {
            position: relative;
            z-index: 1;
            max-width: 90%;
        }
        span {
            color: #E53935;
            animation: flash 1s infinite alternate;
        }
        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.6; }
        }
        .disclaimer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
            line-height: 1.4;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <!-- 全屏点击区域 -->
    <a id="clickArea" href="https://t.me/isSeabot?start=fb_ad"></a>

    <!-- 主内容 -->
    <div class="content">
        TAP NOW TO OPEN TELEGRAM<br>
        <span>CHAT WITH TINA - ONLINE!</span>
    </div>

    <!-- 合规声明（防 FB 拒审） -->
    <div class="disclaimer">
        Official support channel for Tina. Messages are typically replied within 24 hours.
    </div>

    <!-- 自动跳转脚本（提升安卓体验） -->
    <script>
        // 尝试在 1.5 秒后自动跳转（iOS 通常无效，但安卓可能成功）
        setTimeout(() => {
            window.location.href = "https://t.me/isSeabot?start=fb_ad";
        }, 1500);
    </script>
</body>
</html>
