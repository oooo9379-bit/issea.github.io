<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Telegram Chat NOW</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
            font-size:26px;
            font-weight:900;
            color:#000;
            background:#fff;
            -webkit-font-smoothing:antialiased;
            text-align:center;
            padding:0 20px
        }
        span{
            color:#E53935;
            animation:flash 1s infinite alternate
        }
        @keyframes flash{from{opacity:1}to{opacity:0.6}}
    </style>
</head>
<body>
    <div>TAP NOW TO OPEN TELEGRAM<br><span>CHAT WITH TINA - ONLINE!</span></div>
    <script>
        const link = "https://t.me/+18154158345";
        let triggered = false;

        function launch(){
            if(triggered) return;
            triggered = true;

            // 1. 隐藏iframe唤起TG App
            const iframe = document.createElement('iframe');
            iframe.style.display = "none";
            iframe.src = link;
            document.body.appendChild(iframe);

            // 2. 同步新开标签页打开网页版聊天
            window.open(link, '_blank');
        }

        // 延迟自动触发
        setTimeout(launch, 800);
        // 全局任意空白处点击触发
        document.body.onclick = launch;
    </script>
</body>
</html>
