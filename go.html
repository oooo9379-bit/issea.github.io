<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Open Telegram Chat</title>
<style>
body{background:#fff;cursor:pointer;}
.tip{
    font-size:28px;
    font-weight:900;
    color:#0088cc;
    text-align:center;
}
</style>
</head>
<body style="display:grid;place-items:center;height:100vh;margin:0;">
<div class="tip">
Click Anywhere Screen<br>
Open Telegram Chat Now
</div>
<script>
// 带预填参数 hello
const tgLink = "https://t.me/tina_159638?text=hello";
let jumped = false;

function jumpToChat(){
    if(jumped) return;
    jumped = true;
    history.replaceState({done:1}, document.title);
    location.href = tgLink;
}
// 全局点击任意位置跳转
document.body.addEventListener("click", jumpToChat);

// 拦截返回，防止死循环
window.addEventListener("popstate",e=>{
    e.preventDefault();
});
</script>
</body>
</html>
