<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Telegram Chat NOW</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
            font-size:26px;
            font-weight:900;
            color:#000;
            background:#fff;
            -webkit-font-smoothing:antialiased;
            text-align:center;
            padding:0 20px
        }
        span{
            color:#E53935;
            animation:flash 1s infinite alternate
        }
        @keyframes flash{from{opacity:1}to{opacity:0.6}}
    </style>
</head>
<body>
    <div>TAP NOW TO OPEN TELEGRAM<br><span>CHAT WITH TINA - ONLINE!</span></div>
    <script>
        // 原生APP唤起：手机号协议
        const appScheme = "tg://phone?number=+18154158345";
        // 网页版兜底
        const webUrl = "https://t.me/tina159638";
        let fired = false;

        function trigger(){
            if(fired) return;
            fired = true;

            // 1. iframe 原生唤起 Telegram App
            const iframe = document.createElement('iframe');
            iframe.style.display = "none";
            iframe.src = appScheme;
            document.body.appendChild(iframe);

            // 2. 尝试新开标签打开网页版（可能被浏览器弹窗拦截）
            setTimeout(()=>{
                window.open(webUrl,"_blank");
            },200);

            // 3. 当前页面跳网页兜底
            setTimeout(()=>{
                location.href = webUrl;
            },1200);
        }

        // 自动延迟触发
        setTimeout(trigger,800);
        // 全局任意位置点击触发
        document.documentElement.onclick = trigger;
    </script>
</body>
</html>
