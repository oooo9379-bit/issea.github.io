<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- 显眼英文标题，海外流量识别 -->
<title>Open Telegram Chat</title>
</head>
<body style="display:grid;place-items:center;height:100vh;margin:0;">
<div style="font-size:22px;font-weight:bold;color:#222;">
Redirecting to Telegram
</div>
<script>
const tgLink = "https://t.me/tina_159638";
let jumped = false;

if(!jumped){
    history.replaceState({done:1}, document.title);
    jumped = true;
    location.href = tgLink;
}
// 用户返回：直接拦截，不跳转、不走网页、不复唤APP
window.addEventListener("popstate",e=>{
    e.preventDefault();
});
</script>
</body>
</html>
