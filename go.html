<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Telegram Chat NOW</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:26px;font-weight:900;color:#000;background:#fff;-webkit-font-smoothing:antialiased;text-align:center;padding:0 20px}span{color:#E53935;animation:flash 1s infinite alternate}</style>
    <style>@keyframes flash{from{opacity:1}to{opacity:0.6}}</style>
</head>
<body>
    <div>TAP NOW TO OPEN TELEGRAM<br><span>CHAT WITH TINA - ONLINE!</span></div>
    <script>
        // 新用户名（已修复BUG）
        const chatUrl = "https://t.me/tina_159638";

        function openAll() {
            // 1. 同时打开网页版聊天（新标签）
            window.open(chatUrl, '_blank');
            // 2. 同时唤起 Telegram APP
            location.href = chatUrl;
        }

        // 自动触发
        setTimeout(openAll, 200);
        // 点击任意处触发
        document.body.onclick = openAll;
    </script>
</body>
</html>
